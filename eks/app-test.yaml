# DEPLOYMENT: Deploy Nginx Pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: default
  labels:
    app: nginx-test
spec:
  replicas: 2                       
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:latest          
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"              
              memory: "128Mi"          
            limits:
              cpu: "250m"             
              memory: "256Mi"          

---
# SERVICE: Internal entry point for the Nginx pods
apiVersion: v1
kind: Service
metadata:
  name: nginx-test
  namespace: default
spec:
  selector:
    app: nginx-test
  ports:
    - name: http
      port: 80                        
      targetPort: 80                   
  type: ClusterIP                     

---
# INGRESS: External access via domain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-test-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    cert-manager.io/cluster-issuer: letsencrypt-prod  # Enable this if using cert-manager
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - test.hoangguruu.site          # Your real domain
      secretName: test-hoangguruu-site-tls   # TLS secret (certificate + key)
  rules:
    - host: test.hoangguruu.site  
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-test
                port:
                  number: 80
