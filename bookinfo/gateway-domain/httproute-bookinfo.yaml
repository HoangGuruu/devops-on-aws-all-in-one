apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo-route
  namespace: default
spec:
  parentRefs:
  - name: public-gateway
    namespace: default
    sectionName: https-bookinfo
  - name: public-gateway
    namespace: default
    sectionName: http
  hostnames:
  - "bookinfo.hoangguruu.site"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: productpage
      port: 9080