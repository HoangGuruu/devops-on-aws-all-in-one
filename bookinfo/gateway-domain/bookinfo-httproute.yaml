apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo-shared
  namespace: default
spec:
  parentRefs:
  - name: shared-gateway
    namespace: default
    sectionName: http-bookinfo
  - name: shared-gateway
    namespace: default
    sectionName: https-bookinfo
  hostnames:
  - "bookinfo.hoangguruu.site"
  rules:
  - matches:
    - path:
        type: Exact
        value: /
    # - path:
    #     type: PathPrefix
    #     value: /static
    # - path:
    #     type: Exact
    #     value: /login
    # - path:
    #     type: Exact
    #     value: /logout
    # - path:
    #     type: PathPrefix
    #     value: /api/v1/products
    backendRefs:
    - name: productpage
      port: 9080