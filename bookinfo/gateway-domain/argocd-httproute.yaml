apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: arogcd-shared
  namespace: istio-system
spec:
  parentRefs:
  - name: shared-gateway
    namespace: default
    sectionName: http-arogcd
  - name: shared-gateway
    namespace: default
    sectionName: https-arogcd
  hostnames:
  - "arogcd.hoangguruu.site"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd
      port: 443