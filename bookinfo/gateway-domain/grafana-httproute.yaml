apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: istio-system
spec:
  parentRefs:
  - name: grafana-gateway
    namespace: istio-system
    sectionName: http
  - name: grafana-gateway
    namespace: istio-system
    sectionName: https
  hostnames:
  - "grafana.hoangguruu.site"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: grafana
      port: 3000