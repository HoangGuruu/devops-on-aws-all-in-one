apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-details
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: details-v2
  labels:
    app: details
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: details
      version: v2
  template:
    metadata:
      labels:
        app: details
        version: v2
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "bookinfo-details"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/details"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/details" -}}
          export APP_MESSAGE="{{ .Data.data.APP_MESSAGE }}"
          {{- end }}
    spec:
      serviceAccountName: bookinfo-details
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: details
        image: 736059458620.dkr.ecr.us-east-1.amazonaws.com/prod/devops-on-aws-all-in-one:details-latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
          - |
            source /vault/secrets/config
            echo "$APP_MESSAGE"
            exec ruby /opt/microservices/details/details.rb 9080
        ports:
        - containerPort: 9080